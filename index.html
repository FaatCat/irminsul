<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genshin Impact Leaderboards</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="glass">
    <h1>Genshin Impact – Character Leaderboards</h1>
  </header>
  <main>
    <section class="search glass">
      <input type="text" id="uidInput" placeholder="Enter Enka UID (e.g., 123456789)" />
      <button id="loadBtn">Load Profile</button>
    </section>
    <section id="profile" class="glass hidden">
      <h2 id="charName"></h2>
      <img id="charAvatar" src="" alt="Character Avatar" />
      <div id="stats"></div>
    </section>
    <section id="leaderboard" class="glass hidden">
      <h2>Leaderboard – <span id="lbCategory">Anemo DPS</span></h2>
      <table>
        <thead>
          <tr><th>Rank</th><th>User</th><th>CV</th><th>RV</th></tr>
        </thead>
        <tbody id="lbBody"></tbody>
      </table>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
